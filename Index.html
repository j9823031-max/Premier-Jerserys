<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premier Jerseys</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    font-size:45px;
}

header p{
    margin-top:10px;
    color:#ccc;
}

nav{
    background:#00a651;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:18px;
    font-weight:bold;
}

.banner{
    background:linear-gradient(90deg,#00a651,#0077ff);
    color:white;
    text-align:center;
    padding:70px 20px;
}

.banner h2{
    font-size:42px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    margin-top:15px;
}

.price{
    text-align:center;
    color:#00a651;
    font-size:28px;
    font-weight:bold;
    margin:15px;
}

button{
    display:block;
    margin:20px auto;
    padding:12px 30px;
    border:none;
    background:#00a651;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#008844;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>
<h1>⚽ Premier Jerseys</h1>
<p>Premium Soccer Jerseys at Affordable Prices</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Retro</a>
<a href="#">Contact</a>
</nav>

<section class="banner">
<h2>Welcome to Premier Jerseys</h2>
<p>Choose the perfect jersey for your collection.</p>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/400x250?text=No+Name+Jersey">
<h3>No Name Jerseys</h3>
<p class="price">$60</p>
<button>Shop Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x250?text=Named+Jersey">
<h3>Named Jerseys</h3>
<p class="price">$65</p>
<button>Shop Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x250?text=Name+%2B+Badge">
<h3>Name + Badge Jerseys</h3>
<p class="price">$70</p>
<button>Shop Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x250?text=Retro+Jersey">
<h3>Retro Jerseys</h3>
<p class="price">$75</p>
<button>Shop Now</button>
</div>

</section>

<footer>
<p>© 2026 Premier Jerseys | All Rights Reserved</p>
</footer>

</body>
</html>
